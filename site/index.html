<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Usuario</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="contenedor">

    <header class="encabezado">
      <h1>Crear cuenta</h1>
      <p>Completa los campos para registrarte.</p>
    </header>

    <form id="formulario-registro" novalidate>

      <div class="campo">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej. Ana García" autocomplete="name" aria-describedby="error-nombre" />
        <small id="error-nombre" class="mensaje-error" aria-live="polite"></small>
      </div>

      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="Ej. ana@empresa.com" autocomplete="email" aria-describedby="error-email" />
        <small id="error-email" class="mensaje-error" aria-live="polite"></small>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" aria-describedby="error-password" />
        <small id="error-password" class="mensaje-error" aria-live="polite"></small>
      </div>

      <div class="campo">
        <label for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" placeholder="Repite tu contraseña" autocomplete="new-password" aria-describedby="error-confirmar" />
        <small id="error-confirmar" class="mensaje-error" aria-live="polite"></small>
      </div>

      <button type="submit" id="btn-registrar" disabled>Registrarse</button>
      <p id="mensaje-exito" class="mensaje-exito" aria-live="polite"></p>

    </form>

    <section class="seccion-usuarios">
      <div class="usuarios-cabecera">
        <h2>Usuarios registrados <span id="contador" class="contador-badge">0</span></h2>
        <button id="btn-limpiar" type="button" class="btn-limpiar">Limpiar lista</button>
      </div>
      <div id="lista-usuarios" aria-live="polite"></div>
    </section>

  </main>
  <script src="js/app.js"></script>
</body>
</html>
